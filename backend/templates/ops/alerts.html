<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>winegod data ops · alertas</title>
<link rel="stylesheet" href="{{ url_for('static', filename='ops/styles.css') }}">
</head>
<body class="ops-body">
<div class="ops-topbar">
  <div class="ops-brand">winegod <span>data ops</span></div>
  <div class="ops-topright">
    <a href="{{ url_for('ops_dashboard.home') }}">Home</a>
    <a href="{{ url_for('ops_dashboard.alerts') }}">Alertas</a>
    <a href="{{ url_for('ops_dashboard.logout') }}">Sair</a>
  </div>
</div>

<main class="ops-main">
  <h1>Alertas</h1>
  <p class="ops-sub">
    Alertas registrados em ops.scraper_alerts. <strong>MVP nao envia WhatsApp/email.</strong>
    Ack via endpoint foi deliberadamente removido (sub-projeto pos-MVP).
  </p>

  <div class="ops-panel">
    <div class="ops-panel-head"><h2>Alertas recentes</h2></div>
    <table class="ops-table">
      <thead>
        <tr>
          <th>Prioridade</th>
          <th>scraper_id</th>
          <th>Código</th>
          <th>Título</th>
          <th>Ocorrências</th>
          <th>Última</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="alerts-tbody">
        <tr><td colspan="7" class="ops-loading">carregando…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="{{ url_for('static', filename='ops/polling.js') }}"></script>
<script>
  OpsPoll.start({
    endpoints: [{ url: "{{ url_for('ops_dashboard.api_alerts') }}", handler: OpsPoll.renderAlertsTable }],
    intervalMs: 10000
  });
</script>
</body>
</html>
