<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>winegod data ops · login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='ops/styles.css') }}">
</head>
<body class="ops-body">
  <div class="ops-login">
    <div class="ops-login-brand">winegod <span>data ops</span></div>
    <form method="POST" action="{{ url_for('ops_dashboard.login_post') }}" class="ops-login-form">
      <label for="ops-token">Token de acesso</label>
      <input type="password" id="ops-token" name="token" autocomplete="current-password" autofocus required>
      {% if error == 'invalid' %}
        <div class="ops-err">Token invalido.</div>
      {% elif error == 'rate_limited' %}
        <div class="ops-err">Muitas tentativas. Aguarde 15 min.</div>
      {% elif error == 'not_configured' %}
        <div class="ops-err">Dashboard habilitado sem token. Configurar OPS_DASHBOARD_TOKEN.</div>
      {% endif %}
      <button type="submit" class="ops-btn-primary">Entrar</button>
    </form>
    <div class="ops-login-foot">MVP de observabilidade · control plane dos scrapers</div>
  </div>
</body>
</html>
