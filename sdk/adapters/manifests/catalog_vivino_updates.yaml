scraper_id: catalog_vivino_updates
display_name: "Vivino Catalog Updates (observer)"
family: catalog_identity
source: vivino
variant: updates
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/catalog_vivino_updates_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: catalog_identity_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - vinicola_nome
  - pais_codigo
  - regiao_nome
  - atualizado_em
  - reviews_atualizado_em
freshness_sla_hours: 72
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [catalog, observer, vivino, "plug:reviews_scores"]
notes: |
  Adapter READ-ONLY. Le vivino_vinhos e vivino_execucoes para observar atualizacoes
  de catalogo sem escrever em tabelas finais.
