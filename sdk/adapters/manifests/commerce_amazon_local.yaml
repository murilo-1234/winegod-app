scraper_id: commerce_amazon_local
display_name: "Amazon local (observer)"
family: commerce
source: amazon
variant: local
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/amazon_local_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - pais_codigo
  - itens_encontrados
  - vinhos_novos
  - creditos_usados
  - executado_em
freshness_sla_hours: 168
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, observer, amazon, local, "plug:commerce_dq_v3"]
notes: |
  Adapter READ-ONLY. Le amazon_queries, amazon_categorias e amazon_reviews
  persistidos neste host. Nao roda ScrapingDog e nao acessa pc_espelho.
