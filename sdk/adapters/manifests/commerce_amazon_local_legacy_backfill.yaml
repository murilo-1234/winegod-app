scraper_id: commerce_amazon_local_legacy_backfill
display_name: "Amazon Local Legacy Backfill"
family: commerce
source: amazon
variant: legacy_backfill
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.commerce_dq_v3.runner --source amazon_local_legacy_backfill --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - produtor
  - safra
  - pais
  - url_original
  - preco
  - moeda
freshness_sla_hours: 720
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, amazon, legacy, backfill, "plug:commerce_dq_v3", "lineage:legacy_local"]
notes: |
  Backfill controlado do historico amazon_local. Congelado como legado: nao
  deve competir com amazon_mirror_primary como feed principal. Apenas lotes
  controlados apos o espelho estar operacional. Lineage explicita
  `legacy_local` preservada nos items.
