scraper_id: commerce_amazon_mirror_primary
display_name: "Amazon Mirror Primary (feed oficial)"
family: commerce
source: amazon
variant: mirror_primary
owner: murilo
host: este_pc
schedule: daily
entrypoint: python -m sdk.plugs.commerce_dq_v3.runner --source amazon_mirror_primary --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
  - { name: tier_commerce_artifact.v1, version: v1 }
outputs: [ops]
registry_status: blocked_external_host
status_reason: aguardando_jsonl_no_diretorio_reports/data_ops_artifacts/amazon_mirror/
pii_policy: strict
retention_policy: default
declared_fields:
  - pipeline_family
  - run_id
  - country
  - store_name
  - store_domain
  - url_original
  - nome
  - produtor
  - safra
  - preco
  - moeda
  - captured_at
  - source_pointer
freshness_sla_hours: 48
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, amazon, mirror, primary, "plug:commerce_dq_v3", "lineage:primary"]
notes: |
  Feed oficial recorrente da Amazon. Le JSONL padronizado em
  reports/data_ops_artifacts/amazon_mirror/. O dump vem do PC espelho.
  Tem precedencia sobre amazon_local_legacy_backfill em caso de overlap.
  Contrato: docs/TIER_COMMERCE_CONTRACT.md.
