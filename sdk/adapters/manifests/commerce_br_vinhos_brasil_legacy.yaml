scraper_id: commerce_br_vinhos_brasil_legacy
display_name: "Vinhos Brasil legado BR (observer)"
family: commerce
source: vinhos_brasil
variant: legacy
owner: murilo
host: este_pc
schedule: hourly
entrypoint: python sdk/adapters/vinhos_brasil_legacy_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - produtor
  - safra
  - pais
  - preco
  - moeda
  - url_original
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, observer, brasil, legacy]
notes: |
  Adapter READ-ONLY. Le vinhos_brasil, vinhos_brasil_fontes e
  vinhos_brasil_execucoes via SafeReadOnlyClient.
  Nao usa VINHOS_CATALOGO_DATABASE_URL como fallback primario.
  items_final_inserted = 0 sempre.
