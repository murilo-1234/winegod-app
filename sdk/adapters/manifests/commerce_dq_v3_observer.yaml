scraper_id: commerce_dq_v3_observer
display_name: "DQ V3 Observer (read-only bridge)"
family: commerce
source: dq_v3
variant: observer
owner: murilo
host: este_pc
schedule: hourly
entrypoint: python sdk/adapters/dq_v3_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - ingestion_run_id
  - wines_inserted
  - wine_sources_inserted
  - not_wine_rejected
  - review_queued
freshness_sla_hours: 2
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, dq_v3, observer, "plug:commerce_dq_v3"]
notes: |
  Observer READ-ONLY do DQ V3 já validado (handoff DQ_V3_BRIDGE).
  Lê ingestion_run_log, wines.ingestion_run_id, wine_sources.ingestion_run_id,
  not_wine_rejections e ingestion_review_queue via SELECT.
  NÃO recria DQ V3. NÃO faz apply de vinho. NÃO chama Gemini.
  NÃO toca public.wines nem public.wine_sources com escrita.
