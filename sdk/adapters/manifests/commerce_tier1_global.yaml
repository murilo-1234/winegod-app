scraper_id: commerce_tier1_global
display_name: "Tier1 Global APIs"
family: commerce
source: winegod_admin
variant: tier1
owner: murilo
host: este_pc
schedule: daily
entrypoint: python -m sdk.plugs.commerce_dq_v3.runner --source tier1_global --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
status_reason: artefato_padronizado_local_em_reports/data_ops_artifacts/tier1
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - produtor
  - safra
  - pais_codigo
  - url_original
  - fonte
freshness_sla_hours: 48
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, tier1, "plug:commerce_dq_v3", "lineage:primary"]
notes: |
  Feed Tier1 operacional via artefato padronizado local em
  reports/data_ops_artifacts/tier1/. Producer em
  scripts/data_ops_producers/build_commerce_artifact.py --pipeline-family tier1
  --tier-filter api_shopify,api_woocommerce,api_vtex,sitemap_html,sitemap_jsonld
  usa evidencia tecnica real (lojas_scraping.metodo_recomendado) + matching
  por host normalizado com boundary para isolar Tier1 do Tier2. Contrato:
  docs/TIER_COMMERCE_CONTRACT.md.
