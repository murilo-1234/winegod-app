scraper_id: commerce_tier2_global_artifact
display_name: "Tier2 Global (artefato unico)"
family: commerce
source: winegod_admin
variant: tier2_global
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.commerce_dq_v3.runner --source tier2_global_artifact --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
  - { name: tier_commerce_artifact.v1, version: v1 }
outputs: [ops]
registry_status: observed
status_reason: artefato_padronizado_local_em_reports/data_ops_artifacts/tier2_global
pii_policy: strict
retention_policy: default
declared_fields:
  - pipeline_family
  - run_id
  - country
  - store_name
  - store_domain
  - url_original
  - nome
  - produtor
  - safra
  - preco
  - moeda
  - captured_at
  - source_pointer
freshness_sla_hours: 168
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, tier2, global, "plug:commerce_dq_v3", "lineage:primary"]
notes: |
  Feed UNICO Tier2 via artefato padronizado global em
  reports/data_ops_artifacts/tier2_global/. Substitui a ideia de
  tier2_chat1..5 como particoes distintas, que nao tinham criterio
  reproduzivel e disjunto. tier2_br continua separado porque tem
  filtro real por pais.
