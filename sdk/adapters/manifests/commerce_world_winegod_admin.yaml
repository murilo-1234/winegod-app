scraper_id: commerce_world_winegod_admin
display_name: "WineGod Admin Commerce Mundial (observer)"
family: commerce
source: winegod_admin
variant: world
owner: murilo
host: este_pc
schedule: hourly
entrypoint: python sdk/adapters/winegod_admin_commerce_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - produtor
  - safra
  - pais
  - regiao
  - uvas
  - preco
  - moeda
  - url
  - imagem
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, observer, winegod_admin, "plug:commerce_dq_v3"]
notes: |
  Adapter READ-ONLY. Lê winegod_db.vinhos_* locais.
  NÃO modifica scraper real. NÃO chama API externa.
  items_final_inserted = 0 sempre (MVP não escreve dado de negócio).
