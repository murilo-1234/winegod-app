scraper_id: critics_decanter_persisted
display_name: "Decanter Crítica Persistida (observer)"
family: critic
source: decanter
variant: persisted
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/decanter_persisted_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: critic_review_signal.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - score
  - reviewer
  - drink_window
  - review_text
  - source_uri
freshness_sla_hours: 168
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [critic, observer, decanter, "plug:reviews_scores"]
notes: |
  Adapter READ-ONLY. Lê Decanter persistido local (tabela + arquivo JSON status).
  NÃO chama Decanter API. Não usa token externo. Não faz scraping.
