scraper_id: critics_wine_enthusiast
display_name: "Wine Enthusiast Critic Scores (observer)"
family: critic
source: wine_enthusiast
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/wine_enthusiast_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: critic_review_signal.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - we_score
  - we_reviewer
  - we_category
  - atualizado_em
freshness_sla_hours: 72
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [critic, observer, wine_enthusiast, "plug:reviews_scores"]
notes: |
  Adapter READ-ONLY. Le we_vinhos, we_queries e we_exec_* persistidos em
  WINEGOD_DATABASE_URL. Nao chama winemag.com nem APIs externas.
