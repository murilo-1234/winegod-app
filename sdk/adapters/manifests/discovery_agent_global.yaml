scraper_id: discovery_agent_global
display_name: "Discovery Agent Global (observer)"
family: discovery
source: agent_discovery
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/discovery_agent_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: discovery_domain_candidate.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - url
  - plataforma
  - pais
  - verificado
freshness_sla_hours: 168
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [discovery, observer, file]
notes: |
  Adapter READ-ONLY. Le discovery_phases.json e ecommerces_vinhos_*_v2.json.
  Discovery nao vira vinho nem wine_sources diretamente.
