scraper_id: enrichment_gemini_flash
display_name: "Gemini Flash Enrichment (observer)"
family: enrichment
source: gemini_flash
variant: batch
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/enrichment_gemini_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: enrichment_signal.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - batch_job_name
  - total_requests
  - total_wines
  - custo_estimado_usd
  - executada_em
freshness_sla_hours: 168
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [enrichment, observer, gemini, flash]
notes: |
  Adapter READ-ONLY. Le flash_vinhos, flash_queries e artefatos locais de
  batch em reports/. Nao chama Gemini nesta sessao.
