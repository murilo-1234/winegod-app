scraper_id: market_winesearcher
display_name: "Wine-Searcher Market Signals (observer)"
family: market
source: winesearcher
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/winesearcher_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: market_signal.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - ws_critic_score
  - ws_avg_price_usd
  - ws_critic_name
  - atualizado_em
freshness_sla_hours: 72
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [market, observer, winesearcher, "plug:reviews_scores"]
notes: |
  Adapter READ-ONLY. Le ws_vinhos, ws_queries e ws_exec_* persistidos.
  Nao cria wine_sources e nao transforma sinal de mercado em oferta comercial.
