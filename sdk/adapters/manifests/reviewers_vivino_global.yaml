scraper_id: reviewers_vivino_global
display_name: "Vivino Reviewers Global (observer)"
family: reviewer
source: vivino
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/reviewers_vivino_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: reviewer_reference_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - usuario_id
  - total_ratings
  - total_reviews
  - followers
  - idioma
  - localizacao_pais_codigo
freshness_sla_hours: 72
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [reviewer, observer, vivino, "plug:reviews_scores"]
notes: |
  Adapter READ-ONLY. Le vivino_reviewers e reporta somente contagens agregadas.
  Nao envia nome, avatar, bio, email, telefone ou redes sociais para ops.*.
