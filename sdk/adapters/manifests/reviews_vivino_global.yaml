scraper_id: reviews_vivino_global
display_name: "Vivino Reviews Global (observer)"
family: review
source: vivino
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/vivino_reviews_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: user_review.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - review_id
  - wine_external_id
  - rating
  - review_date
freshness_sla_hours: 48
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [review, observer, vivino]
notes: |
  Adapter READ-ONLY. Lê vivino_db.vivino_reviews/vivino_vinhos locais.
  NÃO envia PII (reviewer_name, reviewer_avatar_url, review_text_full, email, profile_url).
  Apenas contagens agregadas e deltas.
  NÃO chama API Vivino. NÃO modifica dados.
