scraper_id: scores_cellartracker
display_name: "CellarTracker Scores (observer)"
family: community_rating
source: cellartracker
variant: global
owner: murilo
host: este_pc
schedule: daily
entrypoint: python sdk/adapters/cellartracker_observer.py --apply
connector_type: TelemetryDelivery
contracts:
  - { name: community_rating_signal.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - ct_score
  - ct_drink_window
  - ct_flavor_summary
  - atualizado_em
freshness_sla_hours: 72
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [community_rating, observer, cellartracker]
notes: |
  Adapter READ-ONLY. Le ct_vinhos, ct_queries e ct_exec_* persistidos em
  WINEGOD_DATABASE_URL. Nao chama CellarTracker nem APIs externas.
