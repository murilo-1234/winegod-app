# Canário Sintético — Winegod Data Ops Fase 1
# Prova end-to-end da cadeia (schema ops.* → SDK → backend /ops/*).
# NÃO toca dados de negócio.
scraper_id: canary_synthetic
display_name: "Canário Sintético (MVP)"
family: canary
source: synthetic
owner: murilo
host: este_pc
schedule: on_demand
entrypoint: python sdk/examples/canary_scraper.py
connector_type: TelemetryDelivery
contracts:
  - { name: canary_event.v1, version: v1 }
outputs: [ops]
pii_policy: strict
retention_policy: default
declared_fields:
  - synthetic_id
  - synthetic_value
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [canary, fase1, fase2]
notes: |
  Gera 100 registros sintéticos em memória (NÃO escritos em nenhum banco de negócio).
  Reporta métricas de observabilidade via SDK.
  Esperado no run de sucesso:
    items_extracted = 100
    items_valid_local = 100
    items_sent = 100
    items_final_inserted = 0   # sempre 0 no MVP
