scraper_id: plug_commerce_dq_v3
display_name: "Commerce DQ V3 Plug"
family: commerce
source: dq_v3
variant: plug
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.commerce_dq_v3.runner --source winegod_admin_world --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: commerce_offer_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - nome
  - produtor
  - safra
  - pais
  - regiao
  - uvas
  - sources
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [commerce, plug, dq_v3, "plug:commerce_dq_v3"]
notes: |
  Plug de dry-run/aplica controlado para fontes commerce. Default dry_run=true.
  Nunca escreve direto em public.wines ou public.wine_sources fora do bulk_ingest.
