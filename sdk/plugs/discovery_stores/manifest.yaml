scraper_id: plug_discovery_stores
display_name: "Discovery Stores Plug"
family: discovery
source: discovery_stores
variant: plug
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.discovery_stores.runner --source agent_discovery --limit 100 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: discovery_store_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - domain
  - country
  - platform
  - validation_status
  - tier_hint
  - recipe_candidate
  - source_lineage
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [discovery, plug, staging, "plug:discovery_stores"]
notes: |
  Plug de staging para lojas candidatas descobertas fora do DQ V3.
  Nao cria stores nem store_recipes finais nesta sessao.
