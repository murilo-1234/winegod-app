scraper_id: plug_enrichment
display_name: "Enrichment Plug"
family: enrichment
source: gemini_flash
variant: plug
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.enrichment.runner --source gemini_batch_reports --limit 100 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: enrichment_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - wine_identity
  - enrichment
  - route
  - source_lineage
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [enrichment, plug, staging, "plug:enrichment"]
notes: |
  Plug de staging para artifacts de Gemini/Flash e saidas enriquecidas.
  Nao chama Gemini real e nao reescreve tabelas finais nesta sessao.
