scraper_id: plug_reviews_scores
display_name: "Reviews Scores Plug"
family: review
source: reviews_scores
variant: plug
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.reviews_scores.runner --source vivino_wines_to_ratings --limit 10000 --apply
connector_type: TelemetryDelivery
contracts:
  - { name: review_score_candidate.v1, version: v1 }
outputs: [ops, public.wine_scores, public.wines]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - wine_identity
  - score
  - review
  - reviewer_ref
  - source_lineage
  - signal_kind
  - score_normalized_100
  - canonical_match_key
  - source_confidence
  - review_freshness_at
  - review_text_present
  - market_price_signal
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [review, plug, staging, apply, "plug:reviews_scores"]
notes: |
  Plug de sinais derivados de reviews/scores.

  Apply em dois alvos:
    - public.wine_scores via UPSERT (wine_id, fonte) unique key.
    - public.wines.vivino_rating/vivino_reviews quando fonte = vivino_wines_to_ratings
      (o trigger trg_score_recalc enfileira recalculo de winegod_score automaticamente).

  Nunca persiste texto bruto de review nem PII em ops.* nem no banco principal.
  Batches de 10k por transacao. Idempotente.
