scraper_id: plug_reviews_scores
display_name: "Reviews Scores Plug"
family: review
source: reviews_scores
variant: plug
owner: murilo
host: este_pc
schedule: manual
entrypoint: python -m sdk.plugs.reviews_scores.runner --source vivino_reviews_to_scores_reviews --limit 50 --dry-run
connector_type: TelemetryDelivery
contracts:
  - { name: review_score_candidate.v1, version: v1 }
outputs: [ops]
registry_status: observed
pii_policy: strict
retention_policy: default
declared_fields:
  - wine_identity
  - score
  - review
  - reviewer_ref
  - source_lineage
freshness_sla_hours: 24
can_create_wine_sources: false
requires_dq_v3: false
requires_matching: false
tags: [review, plug, staging, "plug:reviews_scores"]
notes: |
  Plug de staging PII-safe para reviews, scores, criticas e sinais de mercado.
  Nao grava em tabelas finais nesta sessao.
